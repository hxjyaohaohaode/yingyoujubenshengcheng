services:
  - type: web
    name: script-engine-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        value: "https://script-engine-frontend.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: script-engine-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: script-engine-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: script-engine-redis
          property: connectionString

  - type: web
    name: script-engine-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://script-engine-backend.onrender.com/api"
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: max-age=0, s-maxage=86400

  - type: worker
    name: script-engine-worker
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A tasks worker --loglevel=info
    autoDeploy: true
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: script-engine-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: script-engine-redis
          property: connectionString

  - type: worker
    name: script-engine-beat
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A tasks beat --loglevel=info
    autoDeploy: true
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: script-engine-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: script-engine-redis
          property: connectionString

databases:
  - name: script-engine-db
    plan: free
    databaseName: script_engine
    user: script_engine

redis:
  - name: script-engine-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
